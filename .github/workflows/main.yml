name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  determine-context:
    runs-on: ubuntu-latest
    outputs:
      rebuild: ${{ steps.changes.outputs.rebuild }}
      is_tag: ${{ steps.tag.outputs.is_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            rebuild:
              - 'src/**'
              - 'pyproject.toml'
              - 'build/**'
              - 'tests/**'

      - name: Detect tag push
        id: tag
        run: |
          echo "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}" >> $GITHUB_OUTPUT

  build:
    needs: determine-context
    if: ${{ needs.determine-context.outputs.is_tag == 'true' || needs.determine-context.outputs.rebuild == 'true' }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -v

      - name: Build app
        shell: bash
        run: |
          SEP=":"
          if [ "${RUNNER_OS}" = "Windows" ]; then SEP=";"; fi
          DATA_FLAG="--add-data src/profiles${SEP}profiles"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            pyinstaller --windowed --paths src ${DATA_FLAG} --name "Thesis Counter" src/main.py
          elif [ "${RUNNER_OS}" = "Windows" ]; then
            pyinstaller --onefile --paths src ${DATA_FLAG} --name thesis-counter src/main.py
          else
            pyinstaller --onefile --paths src ${DATA_FLAG} --name thesis-counter src/main.py
          fi

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          if [ "${RUNNER_OS}" = "macOS" ]; then
            hdiutil create -volname "Thesis Counter" -srcfolder "dist/Thesis Counter.app" -ov -format UDZO "thesis-counter-macos.dmg"
            echo "ASSET_PATH=thesis-counter-macos.dmg" >> "$GITHUB_ENV"
          elif [ "${RUNNER_OS}" = "Windows" ]; then
            python -c "import zipfile; z=zipfile.ZipFile('thesis-counter-windows.zip','w',zipfile.ZIP_DEFLATED); z.write('dist/thesis-counter.exe','thesis-counter.exe'); z.close()"
            echo "ASSET_PATH=thesis-counter-windows.zip" >> "$GITHUB_ENV"
          else
            python -c "import tarfile; t=tarfile.open('thesis-counter-linux.tar.gz','w:gz'); t.add('dist/thesis-counter', arcname='thesis-counter'); t.close()"
            echo "ASSET_PATH=thesis-counter-linux.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: ${{ env.ASSET_PATH }}
          if-no-files-found: error

  release:
    if: ${{ needs.determine-context.outputs.is_tag == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          ls -lah release-assets

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          body_path: readme.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
