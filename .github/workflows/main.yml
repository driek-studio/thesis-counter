name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  determine-context:
    runs-on: ubuntu-latest
    outputs:
      rebuild: ${{ steps.changes.outputs.rebuild }}
      is_tag: ${{ steps.tag.outputs.is_tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        uses: dorny/paths-filter@v2
        with:
          filters: |
            rebuild:
              - 'src/**'
              - 'pyproject.toml'
              - 'build/**'
              - 'tests/**'

      - name: Detect tag push
        id: tag
        run: |
          echo "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}" >> $GITHUB_OUTPUT

  build:
    needs: determine-context
    if: ${{ needs.determine-context.outputs.is_tag == 'true' || needs.determine-context.outputs.rebuild == 'true' }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/*

  release:
    if: ${{ needs.determine-context.outputs.is_tag == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package executables
        run: |
          mkdir -p release-binaries
          for dist in artifacts/build-*; do
            os=${dist#artifacts/build-}
            zip -j "release-binaries/thesis-counter-${os}.zip" "$dist"/dist/*
          done

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: release-binaries/*.zip
          body_path: readme.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
